<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      color: #1d1d1f;
      background: #fff;
      line-height: 1.4;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #e5e5e5;
    }
    .topbar-title {
      font-size: 13px;
      font-weight: 600;
      color: #1d1d1f;
      flex: 1;
    }
    .btn-export {
      font-size: 11px;
      font-weight: 500;
      color: #1d1d1f;
      background: #f5f5f7;
      border: none;
      border-radius: 5px;
      padding: 4px 9px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      line-height: 1.5;
    }
    .btn-export:hover { background: #e8e8ed; }

    /* ── ACTION BAR ── */
    .actionbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .btn-scan {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: #1d1d1f;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 0.01em;
    }
    .btn-scan:hover { background: #333; }
    .btn-scan:disabled { background: #8e8e93; cursor: default; }

    .btn-remediate {
      font-size: 12px;
      font-weight: 500;
      color: #1d1d1f;
      background: #f5f5f7;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .btn-remediate:hover { background: #e8e8ed; }
    .btn-remediate:disabled { color: #8e8e93; cursor: default; }

    .stats {
      margin-left: auto;
      font-size: 11px;
      color: #6e6e73;
      white-space: nowrap;
    }
    .stats strong { color: #1d1d1f; }

    /* ── STATUS ── */
    .status {
      font-size: 11px;
      color: #6e6e73;
      padding: 6px 12px;
      border-bottom: 1px solid #e5e5e5;
      min-height: 26px;
    }
    .status.error { color: #d93025; }

    /* ── GROUPS ── */
    .groups { padding: 4px 0; }

    .group { border-bottom: 1px solid #e5e5e5; }

    .group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
    }
    .group-header:hover { background: #f9f9f9; }

    .group-chevron {
      font-size: 9px;
      color: #8e8e93;
      width: 12px;
      text-align: center;
      transition: transform 0.15s;
      display: inline-block;
    }
    .group-chevron.open { transform: rotate(90deg); }

    .group-label {
      font-size: 12px;
      font-weight: 600;
      color: #1d1d1f;
      flex: 1;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      background: #f5f5f7;
      color: #6e6e73;
      min-width: 20px;
      text-align: center;
    }
    .badge.has-issues {
      background: #1d1d1f;
      color: #fff;
    }
    .badge.passed {
      background: #e6f4ea;
      color: #1e7e34;
      font-size: 10px;
      padding: 1px 7px;
    }

    .group-body { display: none; }
    .group-body.open { display: block; }

    /* ── CHECK ROWS ── */
    .check-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 6px 30px;
      cursor: pointer;
      border-bottom: 1px solid #f2f2f2;
    }
    .check-row:last-child { border-bottom: none; }
    .check-row:hover { background: #f9f9f9; }

    .check-icon {
      font-size: 11px;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .check-name {
      font-size: 12px;
      color: #1d1d1f;
      flex: 1;
    }
    .check-name.passed { color: #1e7e34; }
    .check-count {
      font-size: 11px;
      font-weight: 600;
      color: #6e6e73;
      min-width: 16px;
      text-align: right;
    }
    .check-count.has { color: #1d1d1f; }

    /* ── ISSUE LIST ── */
    .issue-list {
      display: none;
      background: #fafafa;
      border-top: 1px solid #e5e5e5;
    }
    .issue-list.open { display: block; }

    .issue-item {
      padding: 8px 12px 8px 30px;
      border-bottom: 1px solid #efefef;
    }
    .issue-item:last-child { border-bottom: none; }
    .issue-item.resolved { opacity: 0.45; }

    .issue-title {
      font-size: 12px;
      font-weight: 500;
      color: #1d1d1f;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }
    .issue-title:hover .issue-title-text { text-decoration: underline; }

    .severity-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .severity-dot.error   { background: #d93025; }
    .severity-dot.warning { background: #f5a623; }
    .severity-dot.info    { background: #8e8e93; }

    .issue-desc {
      font-size: 11px;
      color: #6e6e73;
      margin: 3px 0 6px 11px;
      line-height: 1.45;
    }

    .issue-suggested {
      font-size: 11px;
      color: #1d1d1f;
      background: #f0f0f5;
      border-radius: 4px;
      padding: 3px 7px;
      margin: 0 0 6px 11px;
      font-style: italic;
      word-break: break-word;
    }

    .issue-actions {
      display: flex;
      gap: 5px;
      margin-left: 11px;
    }

    .btn-action {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-accept  { background: #e6f4ea; color: #1e7e34; }
    .btn-accept:hover  { background: #ceead6; }
    .btn-review  { background: #f5f5f7; color: #1d1d1f; }
    .btn-review:hover  { background: #e8e8ed; }
    .btn-skip    { background: #fff; color: #8e8e93; border: 1px solid #d2d2d7; }
    .btn-skip:hover    { background: #f5f5f7; }

    .resolved-label {
      font-size: 11px;
      color: #8e8e93;
      margin-left: 11px;
      font-style: italic;
    }

    /* ── SETTINGS ── */
    .settings-section {
      border-top: 1px solid #e5e5e5;
      margin-top: 4px;
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
    }
    .settings-header:hover { background: #f9f9f9; }
    .settings-title { font-size: 12px; font-weight: 600; color: #6e6e73; flex: 1; }

    .settings-body { display: none; padding: 8px 12px 12px; }
    .settings-body.open { display: block; }

    .settings-label { font-size: 11px; color: #6e6e73; margin-bottom: 4px; }
    .settings-row { display: flex; gap: 6px; }
    .settings-input {
      flex: 1;
      font-size: 12px;
      padding: 5px 8px;
      border: 1px solid #d2d2d7;
      border-radius: 5px;
      color: #1d1d1f;
      background: #fff;
      font-family: monospace;
    }
    .settings-input:focus { outline: none; border-color: #1d1d1f; }
    .btn-save {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      background: #1d1d1f;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn-save:hover { background: #333; }

    .key-status { font-size: 11px; color: #6e6e73; margin-top: 5px; }
    .key-status.active { color: #1e7e34; }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 32px 20px;
      text-align: center;
      color: #8e8e93;
    }
    .empty-state-icon { font-size: 28px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-title">Accessibility</span>
  <a id="btn-pptx" class="btn-export" style="display:none" target="_blank">&#8595; PPTX</a>
  <a id="btn-pdf"  class="btn-export" style="display:none" target="_blank">&#8595; PDF</a>
</div>

<!-- ACTION BAR -->
<div class="actionbar">
  <button class="btn-scan"      id="btn-scan"      onclick="scan()">Scan</button>
  <button class="btn-remediate" id="btn-remediate" onclick="remediateAll()" disabled>Fix All</button>
  <span   class="stats"         id="stats"></span>
</div>

<!-- STATUS -->
<div class="status" id="status">Click Scan to check this presentation.</div>

<!-- GROUPS -->
<div class="groups" id="groups">
  <div class="empty-state" id="empty-state">
    <div class="empty-state-icon">&#9675;</div>
    <p>Run a scan to see<br>accessibility issues.</p>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-section">
  <div class="settings-header" onclick="toggleSettings()">
    <span class="group-chevron" id="settings-chevron">&#9658;</span>
    <span class="settings-title">Settings</span>
    <span class="key-status" id="key-status-inline"></span>
  </div>
  <div class="settings-body" id="settings-body">
    <div class="settings-label">Anthropic API Key (optional — enables AI alt text &amp; titles)</div>
    <div class="settings-row">
      <input class="settings-input" id="api-key-input" type="password" placeholder="sk-ant-&hellip;">
      <button class="btn-save" onclick="saveKey()">Save</button>
    </div>
    <div class="key-status" id="key-status-detail"></div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────

var state = {
  issues:    [],
  statuses:  {},       // id → 'pending' | 'accepted' | 'skipped' | 'reviewed'
  expanded:  {},       // groupKey → bool
  checkOpen: {},       // checkType → bool
  aiEnabled: false,
  scanned:   false,
};

// ── CHECK METADATA ────────────────────────────────────────────────────────────

var GROUPS = [
  {
    key: "presentation", label: "Presentation",
    checks: [
      { type: "presentation_title", label: "Presentation title" },
      { type: "document_language",  label: "Document language" },
    ]
  },
  {
    key: "slides", label: "Slides",
    checks: [
      { type: "missing_slide_title", label: "Slide titles" },
      { type: "duplicate_title",     label: "Duplicate titles" },
      { type: "empty_slide",         label: "Empty slides" },
    ]
  },
  {
    key: "tables", label: "Tables",
    checks: [
      { type: "missing_table_alt", label: "Table descriptions" },
      { type: "merged_cells",      label: "Merged cells" },
      { type: "empty_cells",       label: "Empty cells" },
    ]
  },
  {
    key: "elements", label: "Elements",
    checks: [
      { type: "missing_alt_text",  label: "Image alt text" },
      { type: "element_alt_text",  label: "Chart / group alt text" },
      { type: "empty_textbox",     label: "Empty text boxes" },
      { type: "broken_lists",      label: "Broken lists" },
    ]
  },
  {
    key: "contents", label: "Contents",
    checks: [
      { type: "small_text",     label: "Small text" },
      { type: "low_contrast",   label: "Low contrast text" },
      { type: "inline_style",   label: "Inline style changes" },
      { type: "trailing_lines", label: "Trailing empty lines" },
    ]
  },
];

var ALL_CHECK_TYPES = [];
GROUPS.forEach(function(g) { g.checks.forEach(function(c) { ALL_CHECK_TYPES.push(c.type); }); });

// ── SCAN ─────────────────────────────────────────────────────────────────────

function scan() {
  setStatus("Scanning\u2026");
  setBusy(true);
  google.script.run
    .withSuccessHandler(function(result) {
      state.issues    = result.issues || [];
      state.aiEnabled = result.aiEnabled;
      state.statuses  = {};
      state.scanned   = true;
      state.issues.forEach(function(iss) { state.statuses[iss.id] = "pending"; });
      setBusy(false);
      var n = state.issues.length;
      setStatus("Found " + n + " issue" + (n === 1 ? "" : "s") + ".");
      loadExportUrls();
      render();
    })
    .withFailureHandler(function(err) {
      setBusy(false);
      setStatus("Error: " + (err.message || err), true);
    })
    .scanPresentation();
}

function remediateAll() {
  setStatus("Applying all auto-fixes\u2026");
  setBusy(true);
  google.script.run
    .withSuccessHandler(function(r) {
      var msg = "Fixed " + r.fixed + (r.failed ? ", " + r.failed + " failed" : "") + ". Rescanning\u2026";
      setStatus(msg);
      google.script.run
        .withSuccessHandler(function(result) {
          state.issues    = result.issues || [];
          state.aiEnabled = result.aiEnabled;
          state.statuses  = {};
          state.scanned   = true;
          state.issues.forEach(function(iss) { state.statuses[iss.id] = "pending"; });
          setBusy(false);
          var n = state.issues.length;
          setStatus("Rescan complete. " + n + " issue" + (n === 1 ? "" : "s") + " remaining.");
          render();
        })
        .withFailureHandler(function(err) {
          setBusy(false);
          setStatus("Rescan error: " + (err.message || err), true);
        })
        .scanPresentation();
    })
    .withFailureHandler(function(err) {
      setBusy(false);
      setStatus("Error: " + (err.message || err), true);
    })
    .remediateAll();
}

// ── ISSUE ACTIONS ─────────────────────────────────────────────────────────────

function acceptIssue(issueId) {
  var issue = getIssue(issueId);
  if (!issue) return;
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.ok) { state.statuses[issueId] = "accepted"; render(); }
    })
    .withFailureHandler(function(err) { setStatus("Fix error: " + (err.message || err), true); })
    .applyFix(issue);
}

function skipIssue(issueId) {
  state.statuses[issueId] = "skipped";
  render();
}

function markReviewed(issueId) {
  var issue = getIssue(issueId);
  if (!issue) return;
  google.script.run
    .withSuccessHandler(function() { state.statuses[issueId] = "reviewed"; render(); })
    .applyFix(issue);
}

function navigateTo(slideIndex, elementId) {
  if (slideIndex < 0) return;
  google.script.run.navigateToElement(slideIndex, elementId || "");
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function render() {
  var groupsEl = document.getElementById("groups");
  var remBtn   = document.getElementById("btn-remediate");
  var statsEl  = document.getElementById("stats");

  if (!state.scanned) {
    groupsEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9675;</div><p>Run a scan to see<br>accessibility issues.</p></div>';
    statsEl.innerHTML  = "";
    remBtn.disabled    = true;
    return;
  }

  // Count pending per checkType
  var pendingByType = {};
  ALL_CHECK_TYPES.forEach(function(t) { pendingByType[t] = []; });
  state.issues.forEach(function(iss) {
    if (state.statuses[iss.id] === "pending" && pendingByType[iss.checkType]) {
      pendingByType[iss.checkType].push(iss);
    }
  });

  var totalChecks  = ALL_CHECK_TYPES.length;
  var passedChecks = 0;
  ALL_CHECK_TYPES.forEach(function(t) { if (pendingByType[t].length === 0) passedChecks++; });

  var hasAutoFixable = state.issues.some(function(iss) {
    return state.statuses[iss.id] === "pending" && iss.autoFixable;
  });

  statsEl.innerHTML = "<strong>" + passedChecks + "/" + totalChecks + "</strong> checks passed";
  remBtn.disabled   = !hasAutoFixable;

  var html = "";
  GROUPS.forEach(function(group) {
    var groupPending = 0;
    group.checks.forEach(function(c) { groupPending += pendingByType[c.type].length; });
    var isOpen = !!state.expanded[group.key];

    var badgeHtml = groupPending === 0
      ? '<span class="badge passed">Passed</span>'
      : '<span class="badge has-issues">' + groupPending + '</span>';

    html += '<div class="group">';
    html += '<div class="group-header" onclick="toggleGroup(\'' + group.key + '\')">';
    html += '<span class="group-chevron' + (isOpen ? ' open' : '') + '">&#9658;</span>';
    html += '<span class="group-label">' + group.label + '</span>';
    html += badgeHtml;
    html += '</div>';

    html += '<div class="group-body' + (isOpen ? ' open' : '') + '">';

    group.checks.forEach(function(check) {
      var pending   = pendingByType[check.type];
      var allIssues = state.issues.filter(function(iss) { return iss.checkType === check.type; });
      var isPassed  = pending.length === 0;
      var isCheckOpen = !!state.checkOpen[check.type];

      var iconHtml = isPassed
        ? '<span class="check-icon" style="color:#1e7e34">&#10003;</span>'
        : '<span class="check-icon" style="color:#d93025">&#10005;</span>';

      html += '<div>';
      html += '<div class="check-row" onclick="toggleCheck(\'' + check.type + '\')">';
      html += iconHtml;
      html += '<span class="check-name' + (isPassed ? ' passed' : '') + '">' + esc(check.label) + '</span>';
      if (!isPassed) html += '<span class="check-count has">' + pending.length + '</span>';
      html += '</div>';

      if (allIssues.length > 0) {
        html += '<div class="issue-list' + (isCheckOpen ? ' open' : '') + '">';
        allIssues.forEach(function(iss) {
          var status     = state.statuses[iss.id] || "pending";
          var isResolved = status !== "pending";

          html += '<div class="issue-item' + (isResolved ? ' resolved' : '') + '">';
          html += '<div class="issue-title" onclick="navigateTo(' + iss.slideIndex + ', \'' + esc(iss.elementId) + '\')">';
          html += '<span class="severity-dot ' + esc(iss.severity) + '"></span>';
          html += '<span class="issue-title-text">' + esc(iss.title) + '</span>';
          html += '</div>';

          if (!isResolved) {
            html += '<div class="issue-desc">' + esc(iss.description) + '</div>';
            if (iss.suggestedValue) {
              html += '<div class="issue-suggested">' + esc(iss.suggestedValue) + '</div>';
            }
            html += '<div class="issue-actions">';
            if (iss.autoFixable) {
              html += '<button class="btn-action btn-accept" onclick="event.stopPropagation();acceptIssue(\'' + iss.id + '\')">Accept</button>';
            }
            if (iss.manual) {
              html += '<button class="btn-action btn-review" onclick="event.stopPropagation();markReviewed(\'' + iss.id + '\')">Mark Reviewed</button>';
            }
            html += '<button class="btn-action btn-skip" onclick="event.stopPropagation();skipIssue(\'' + iss.id + '\')">Skip</button>';
            html += '</div>';
          } else {
            var label = status === "accepted" ? "Accepted" : status === "reviewed" ? "Reviewed" : "Skipped";
            html += '<div class="resolved-label">' + label + '</div>';
          }

          html += '</div>';
        });
        html += '</div>';
      }

      html += '</div>';
    });

    html += '</div>'; // group-body
    html += '</div>'; // group
  });

  groupsEl.innerHTML = html;
}

// ── TOGGLES ───────────────────────────────────────────────────────────────────

function toggleGroup(key) {
  state.expanded[key] = !state.expanded[key];
  render();
}

function toggleCheck(checkType) {
  state.checkOpen[checkType] = !state.checkOpen[checkType];
  render();
}

function toggleSettings() {
  var body    = document.getElementById("settings-body");
  var chevron = document.getElementById("settings-chevron");
  var open    = body.classList.toggle("open");
  chevron.classList.toggle("open", open);
}

// ── EXPORT URLS ───────────────────────────────────────────────────────────────

function loadExportUrls() {
  google.script.run
    .withSuccessHandler(function(urls) {
      var pptx = document.getElementById("btn-pptx");
      var pdf  = document.getElementById("btn-pdf");
      pptx.href = urls.pptx; pptx.style.display = "";
      pdf.href  = urls.pdf;  pdf.style.display  = "";
    })
    .getExportUrls();
}

// ── SETTINGS ─────────────────────────────────────────────────────────────────

function saveKey() {
  var key = document.getElementById("api-key-input").value.trim();
  google.script.run
    .withSuccessHandler(function() {
      document.getElementById("api-key-input").value = "";
      loadKeyStatus();
    })
    .saveApiKey(key);
}

function loadKeyStatus() {
  google.script.run
    .withSuccessHandler(function(masked) {
      var detail = document.getElementById("key-status-detail");
      var inline = document.getElementById("key-status-inline");
      if (masked) {
        detail.className  = "key-status active";
        detail.textContent = "Key saved: " + masked;
        inline.className  = "key-status active";
        inline.textContent = "AI on";
      } else {
        detail.className  = "key-status";
        detail.textContent = "No key saved \u2014 AI features disabled.";
        inline.className  = "key-status";
        inline.textContent = "";
      }
    })
    .getApiKeyMasked();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function getIssue(id) {
  for (var i = 0; i < state.issues.length; i++) {
    if (state.issues[i].id === id) return state.issues[i];
  }
  return null;
}

function setStatus(msg, isError) {
  var el = document.getElementById("status");
  el.textContent = msg;
  el.className   = "status" + (isError ? " error" : "");
}

function setBusy(busy) {
  document.getElementById("btn-scan").disabled = busy;
}

function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ── INIT ──────────────────────────────────────────────────────────────────────

loadKeyStatus();
</script>
</body>
</html>
